# Produção — orquestra todos os serviços via Cloudflare Tunnel.
# Uso: docker compose -f docker-compose.prod.yml up -d --build
#
# Pré-requisito: arquivo .env preenchido a partir do .env.example

volumes:
  postgres_data:
  n8n_data:
  evolution_data:

services:
  postgres:
    image: postgres:16
    container_name: postgres_confeitaria
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: backend_confeitaria
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      BACKEND_API_KEY: ${BACKEND_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        # Injetado no nginx.conf via template — não fica no bundle JS
        BACKEND_API_KEY: ${BACKEND_API_KEY}
        API_URL: ${API_URL}
    container_name: frontend_confeitaria
    restart: always
    depends_on:
      - backend
    expose:
      - "5173"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_confeitaria
    restart: always
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      NODE_ENV: production
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api_confeitaria
    restart: always
    expose:
      - "8080"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      SERVER_URL: ${EVOLUTION_URL}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: always
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - backend
      - frontend
      - n8n
      - evolution-api
